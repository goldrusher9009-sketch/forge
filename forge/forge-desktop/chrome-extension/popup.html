<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:280px; background:#0a0a0f; color:#e2e8f0; font-family:system-ui,sans-serif; padding:16px; }
    .logo { font-size:20px; font-weight:800; background:linear-gradient(135deg,#7C3AED,#2563EB); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:4px; }
    .sub { font-size:12px; color:#64748b; margin-bottom:16px; }
    .status { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:8px; font-size:13px; margin-bottom:12px; }
    .status.connected { background:#7C3AED15; border:1px solid #7C3AED40; color:#a78bfa; }
    .status.disconnected { background:#DC262615; border:1px solid #DC262640; color:#f87171; }
    .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .dot.on { background:#7C3AED; }
    .dot.off { background:#DC2626; }
    .btn { width:100%; padding:8px 12px; border-radius:8px; border:none; cursor:pointer; font-size:13px; font-weight:600; margin-bottom:8px; }
    .btn-primary { background:linear-gradient(135deg,#7C3AED,#2563EB); color:#fff; }
    .btn-secondary { background:#1e293b; color:#94a3b8; border:1px solid #334155; }
    .info { font-size:11px; color:#475569; text-align:center; margin-top:8px; }
  </style>
</head>
<body>
  <div class="logo">⚡ Forge AI</div>
  <div class="sub">Desktop Bridge</div>

  <div id="status" class="status disconnected">
    <div id="dot" class="dot off"></div>
    <span id="status-text">Connecting to Forge Desktop…</span>
  </div>

  <button class="btn btn-primary" id="send-page">📄 Send This Page to Forge</button>
  <button class="btn btn-secondary" id="open-forge">Open Forge Desktop</button>

  <div class="info">Forge Desktop must be running to use this extension</div>

  <script src="popup.js"></script>
</body>
</html>
