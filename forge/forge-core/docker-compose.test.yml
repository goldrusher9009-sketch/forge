version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: forge_postgres_test
    environment:
      POSTGRES_DB: forge_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - forge_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  forge_test_data:

# Usage:
# docker-compose -f docker-compose.test.yml up -d
#
# Environment variable:
# export TEST_DATABASE_URL="postgres://postgres:postgres@localhost/forge_test"
#
# Run tests:
# cargo test --test integration_executor_handlers -- --ignored --test-threads=1
#
# Cleanup:
# docker-compose -f docker-compose.test.yml down -v
