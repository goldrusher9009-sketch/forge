<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Forge AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      background: #0f0f0f;
      color: #e5e5e5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 0;
    }
    .header {
      background: linear-gradient(135deg, #7C3AED 0%, #F97316 100%);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo { font-size: 22px; }
    .header-text h1 { font-size: 16px; font-weight: 700; color: #fff; }
    .header-text p { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 2px; }
    .section { padding: 14px 16px; border-bottom: 1px solid #222; }
    .section:last-child { border-bottom: none; }
    .section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin-bottom: 10px; }
    .btn {
      width: 100%;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: opacity 0.15s;
      margin-bottom: 6px;
    }
    .btn:last-child { margin-bottom: 0; }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, #7C3AED, #F97316); color: #fff; }
    .btn-secondary { background: #1a1a1a; color: #e5e5e5; border: 1px solid #333; }
    .btn-icon { font-size: 16px; }
    .page-info {
      background: #141414;
      border-radius: 8px;
      padding: 10px;
      border: 1px solid #222;
    }
    .page-title { font-size: 12px; font-weight: 600; color: #e5e5e5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .page-url { font-size: 10px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
    .shortcut { font-size: 10px; color: #555; text-align: center; padding: 8px; }
    kbd {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-family: monospace;
      color: #888;
    }
    #selection-info { display: none; }
    .selection-badge {
      display: inline-block;
      background: rgba(124,58,237,0.2);
      border: 1px solid rgba(124,58,237,0.4);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 10px;
      color: #a78bfa;
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">⚡</div>
    <div class="header-text">
      <h1>Forge AI</h1>
      <p>AI agent on every page</p>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Current Page</div>
    <div class="page-info">
      <div class="page-title" id="page-title">Loading…</div>
      <div class="page-url" id="page-url"></div>
      <div id="selection-info"><div class="selection-badge" id="selection-text"></div></div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Actions</div>
    <button class="btn btn-primary" id="btn-sidebar">
      <span class="btn-icon">💬</span>
      Open Forge Sidebar
    </button>
    <button class="btn btn-secondary" id="btn-open-forge">
      <span class="btn-icon">🚀</span>
      Open Forge App
    </button>
    <button class="btn btn-secondary" id="btn-ask-page">
      <span class="btn-icon">🔍</span>
      Ask about this page
    </button>
  </div>

  <div class="shortcut">
    Toggle sidebar: <kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>F</kbd>
  </div>

  <script src="popup.js"></script>
</body>
</html>
