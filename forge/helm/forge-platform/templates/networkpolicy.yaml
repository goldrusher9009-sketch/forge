apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forge-default-deny
  namespace: {{ .Values.global.namespace | default "forge" }}
  labels:
    app: forge-platform
    environment: {{ .Values.global.environment }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forge-allow-ingress
  namespace: {{ .Values.global.namespace | default "forge" }}
  labels:
    app: forge-platform
    environment: {{ .Values.global.environment }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forge-allow-services
  namespace: {{ .Values.global.namespace | default "forge" }}
  labels:
    app: forge-platform
    environment: {{ .Values.global.environment }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 9200
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
