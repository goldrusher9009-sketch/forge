global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'forge-platform'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 10s
    scrape_timeout: 5s

  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:3000']
    scrape_interval: 15s

  - job_name: 'database'
    static_configs:
      - targets: ['db:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']

remote_write:
  - url: "http://prometheus:9090/api/v1/write"
    write_relabel_configs:
      - source_labels: [__name__]
        regex: '.*'
        action: 'keep'
