input {
  tcp {
    port => 5000
    codec => json
  }

  http {
    port => 8080
    codec => json
  }

  file {
    path => "/var/log/forge/app.log"
    start_position => "beginning"
    codec => json
  }
}

filter {
  if [type] == "api" {
    mutate {
      add_field => { "[@metadata][index_name]" => "logs-api" }
    }
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:logger} %{GREEDYDATA:msg}" }
    }
  }

  if [type] == "application" {
    mutate {
      add_field => { "[@metadata][index_name]" => "logs-app" }
    }
  }

  if [level] == "ERROR" || [level] == "FATAL" {
    mutate {
      add_tag => [ "error" ]
    }
  }

  date {
    match => [ "timestamp", "ISO8601" ]
    target => "@timestamp"
  }

  mutate {
    remove_field => [ "message" ]
  }
}

output {
  elasticsearch {
    hosts => [ "${ELASTICSEARCH_HOSTS}" ]
    index => "%{[@metadata][index_name]}-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  if "error" in [tags] {
    email {
      to => "alerts@forge.ai"
      from => "logstash@forge.ai"
      subject => "[ALERT] Error in %{type} logs"
      body => "Timestamp: %{@timestamp}\nLevel: %{level}\nLogger: %{logger}\nMessage: %{msg}"
    }
  }

  stdout {
    codec => rubydebug
  }
}
