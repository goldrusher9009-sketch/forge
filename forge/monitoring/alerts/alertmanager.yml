global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK}'
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

templates:
  - '/etc/alertmanager/templates/*.tmpl'

route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: critical-escalation
      group_wait: 0s
      group_interval: 1m
      repeat_interval: 30m
      continue: true

    - match:
        severity: warning
      receiver: warning-notifications
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 2h

    - match:
        alertname: HighErrorRate
      receiver: error-team
      group_wait: 5s
      continue: true

    - match:
        alertname: HighLatency
      receiver: performance-team
      group_wait: 30s

    - match:
        alertname: PodMemoryUsage|PodCPUUsage
      receiver: infrastructure-team
      group_wait: 10s

receivers:
  - name: 'default'
    slack_configs:
      - channel: '#alerts'
        title: '[{{ .GroupLabels.alertname }}] Alert'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'

  - name: 'critical-escalation'
    slack_configs:
      - channel: '#critical-alerts'
        title: 'CRITICAL: [{{ .GroupLabels.alertname }}]'
        text: 'Immediate action required!\n{{ range .Alerts }}{{ .Annotations.description }}\nDashboard: {{ .Annotations.dashboard }}{{ end }}'
        send_resolved: true
        color: 'danger'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_SERVICE_KEY}'
        client: 'Forge Platform'
        client_url: 'https://forge.ai'
        details:
          firing: '{{ template "pagerduty.default.instances" .Alerts.Firing }}'

  - name: 'warning-notifications'
    slack_configs:
      - channel: '#warnings'
        title: '[{{ .GroupLabels.alertname }}] Warning'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        send_resolved: true
        color: 'warning'

  - name: 'error-team'
    slack_configs:
      - channel: '#platform-errors'
        title: 'Application Error Alert'
        text: '{{ range .Alerts }}Service: {{ .Labels.service }}\nError Rate: {{ .Annotations.value }}\nDashboard: https://forge.ai/dashboards/errors{{ end }}'
    email_configs:
      - to: 'platform-errors@forge.ai'
        from: 'alerts@forge.ai'
        smarthost: '${SMTP_HOST}:${SMTP_PORT}'
        auth_username: '${SMTP_USER}'
        auth_password: '${SMTP_PASSWORD}'
        headers:
          Subject: '[ALERT] High Error Rate Detected'

  - name: 'performance-team'
    slack_configs:
      - channel: '#performance'
        title: 'Performance Alert'
        text: '{{ range .Alerts }}Service: {{ .Labels.service }}\nP95 Latency: {{ .Annotations.value }}\nRunbook: {{ .Annotations.runbook }}{{ end }}'

  - name: 'infrastructure-team'
    slack_configs:
      - channel: '#infrastructure'
        title: 'Infrastructure Alert'
        text: '{{ range .Alerts }}Pod: {{ .Labels.pod }}\nNamespace: {{ .Labels.namespace }}\nValue: {{ .Annotations.value }}{{ end }}'
    pagerduty_configs:
      - service_key: '${PAGERDUTY_INFRA_KEY}'
        client: 'Forge Infrastructure'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  - source_match:
      alertname: 'HighErrorRate'
    target_match:
      alertname: 'HighLatency'
    equal: ['service']
