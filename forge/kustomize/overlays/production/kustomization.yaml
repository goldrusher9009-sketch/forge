apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forge-platform

bases:
  - ../../base

namePrefix: prod-

commonLabels:
  environment: production
  tier: production
  sla: critical

commonAnnotations:
  environment: production
  production: "true"
  disaster-recovery: "enabled"
  backup: "daily"
  last-updated: "2026-05-06"

patchesStrategicMerge:
  - patches/deployment-patch.yaml

patchesJson6902:
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: forge-frontend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 3
      - op: replace
        path: /spec/maxReplicas
        value: 20
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: forge-api-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 5
      - op: replace
        path: /spec/maxReplicas
        value: 20
  - target:
      kind: Ingress
      name: forge-ingress
    patch: |-
      - op: add
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
        value: letsencrypt-prod
      - op: add
        path: /metadata/annotations/nginx.ingress.kubernetes.io~1ssl-protocols
        value: "TLSv1.2 TLSv1.3"

configMapGenerator:
  - name: forge-config
    behavior: merge
    literals:
      - ENVIRONMENT=production
      - LOG_LEVEL=warn
      - API_DEBUG=false
      - CACHE_ENABLED=true
      - CACHE_TTL=3600
      - DATABASE_POOL_SIZE=20
      - DATABASE_REPLICA_ENABLED=true
      - WORKER_CONCURRENCY=10
      - SESSION_TIMEOUT=86400
      - JWT_EXPIRY=7d
      - MAX_REQUEST_BODY_SIZE=10485760

secretGenerator:
  - name: forge-secrets
    behavior: merge
    envs:
      - ../../secrets/production.env

images:
  - name: forge-frontend
    newTag: v1.0.0
  - name: forge-api
    newTag: v1.0.0

replicas:
  - name: forge-frontend
    count: 5
  - name: forge-api
    count: 5

vars:
  - name: PRODUCTION_NAMESPACE
    objref:
      kind: Service
      name: forge-frontend
      apiVersion: v1
    fieldref:
      fieldpath: metadata.namespace
  - name: PRODUCTION_DOMAIN
    objref:
      kind: Ingress
      name: forge-ingress
    fieldref:
      fieldpath: spec.rules[0].host

patches:
  - target:
      kind: Service
      name: forge-frontend
    patch: |-
      - op: add
        path: /metadata/annotations/monitoring.coreos.com~1metrics
        value: "true"
      - op: add
        path: /metadata/annotations/backup.velero.io~1backup
        value: "true"
  - target:
      kind: Service
      name: forge-api
    patch: |-
      - op: add
        path: /metadata/annotations/monitoring.coreos.com~1metrics
        value: "true"
      - op: add
        path: /metadata/annotations/backup.velero.io~1backup
        value: "true"
  - target:
      kind: Deployment
      name: forge-frontend
    patch: |-
      - op: add
        path: /metadata/annotations/fluentd.io~1exclude
        value: "false"
  - target:
      kind: Deployment
      name: forge-api
    patch: |-
      - op: add
        path: /metadata/annotations/fluentd.io~1exclude
        value: "false"

# Production resource name mappings
replacements:
  - source:
      kind: ConfigMap
      name: forge-config
      fieldpath: data.ENVIRONMENT
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers[].env[name=ENVIRONMENT].value

# Network policies specific to production
patchesStrategicMergeOverlay:
  - metadata:
      name: forge-allow-ingress
    spec:
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
                  name: ingress-nginx
          ports:
            - protocol: TCP
              port: 3000
            - protocol: TCP
              port: 8000
            - protocol: TCP
              port: 3001
            - protocol: TCP
              port: 8001

metadata:
  name: forge-platform-production
  description: Production overlay for Forge Platform with high availability and security
