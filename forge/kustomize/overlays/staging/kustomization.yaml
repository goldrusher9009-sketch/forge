apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forge-platform

bases:
  - ../../base

namePrefix: staging-

commonLabels:
  environment: staging
  stage: staging

commonAnnotations:
  environment: staging
  last-updated: "2026-05-06"

patchesStrategicMerge:
  - patches/deployment-patch.yaml

patchesJson6902:
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: forge-frontend-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5
  - target:
      group: autoscaling
      version: v2
      kind: HorizontalPodAutoscaler
      name: forge-api-hpa
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 2
      - op: replace
        path: /spec/maxReplicas
        value: 5

configMapGenerator:
  - name: forge-config
    behavior: merge
    literals:
      - ENVIRONMENT=staging
      - LOG_LEVEL=debug
      - API_DEBUG=true
      - CACHE_ENABLED=true
      - DATABASE_POOL_SIZE=5
      - WORKER_CONCURRENCY=2

secretGenerator:
  - name: forge-secrets
    behavior: merge
    envs:
      - ../../secrets/staging.env

images:
  - name: forge-frontend
    newTag: staging-latest
  - name: forge-api
    newTag: staging-latest

replicas:
  - name: forge-frontend
    count: 2
  - name: forge-api
    count: 2

vars:
  - name: STAGING_NAMESPACE
    objref:
      kind: Service
      name: forge-frontend
      apiVersion: v1
    fieldref:
      fieldpath: metadata.namespace

patches:
  - target:
      kind: Service
      name: forge-frontend
    patch: |-
      - op: add
        path: /metadata/annotations/ingress.class
        value: nginx-staging
  - target:
      kind: Service
      name: forge-api
    patch: |-
      - op: add
        path: /metadata/annotations/ingress.class
        value: nginx-staging

# Resource name mappings
replacements:
  - source:
      kind: ConfigMap
      name: forge-config
      fieldpath: data.ENVIRONMENT
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers[].env[name=ENVIRONMENT].value

metadata:
  name: forge-platform-staging
  description: Staging overlay for Forge Platform
