apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-platform
  namespace: forge-platform
  labels:
    app: forge-platform
  annotations:
    description: "Service account for Forge Platform applications"

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: forge-platform
  namespace: forge-platform
  labels:
    app: forge-platform
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: forge-platform
  namespace: forge-platform
  labels:
    app: forge-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: forge-platform
subjects:
  - kind: ServiceAccount
    name: forge-platform
    namespace: forge-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forge-platform-metrics
  labels:
    app: forge-platform
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes/stats"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes/proxy"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forge-platform-metrics
  labels:
    app: forge-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: forge-platform-metrics
subjects:
  - kind: ServiceAccount
    name: forge-platform
    namespace: forge-platform
