apiVersion: v1
kind: Namespace
metadata:
  name: forge-platform
  labels:
    name: forge-platform
    managed-by: kustomize
  annotations:
    description: "Production namespace for Forge Platform applications"
    team: platform-engineering
    environment: production

---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: forge-quota
  namespace: forge-platform
spec:
  hard:
    requests.cpu: "50"
    requests.memory: "100Gi"
    limits.cpu: "100"
    limits.memory: "200Gi"
    pods: "100"
    services: "20"
    services.loadbalancers: "2"
    persistentvolumeclaims: "10"
    replicationcontrollers: "20"
    deployments.apps: "20"
    statefulsets.apps: "10"
    jobs.batch: "50"
    cronjobs.batch: "10"
  scopeSelector:
    matchExpressions:
      - operator: In
        scopeName: PriorityClass
        values: ["default", "high-priority"]

---
apiVersion: v1
kind: LimitRange
metadata:
  name: forge-limits
  namespace: forge-platform
spec:
  limits:
    - max:
        cpu: "4"
        memory: "4Gi"
      min:
        cpu: "100m"
        memory: "128Mi"
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "250m"
        memory: "256Mi"
      type: Container
    - max:
        cpu: "8"
        memory: "8Gi"
      min:
        cpu: "100m"
        memory: "128Mi"
      type: Pod

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forge-allow-ingress
  namespace: forge-platform
spec:
  podSelector:
    matchLabels:
      app: forge-platform
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000
        - protocol: TCP
          port: 8000
    - from:
        - namespaceSelector:
            matchLabels:
              name: monitoring
      ports:
        - protocol: TCP
          port: 3001
        - protocol: TCP
          port: 8001

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: forge-allow-egress
  namespace: forge-platform
spec:
  podSelector:
    matchLabels:
      app: forge-platform
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    - to:
        - namespaceSelector:
            matchLabels:
              name: kube-system
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 443

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: forge-frontend-pdb
  namespace: forge-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: forge-frontend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: forge-api-pdb
  namespace: forge-platform
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: forge-api
